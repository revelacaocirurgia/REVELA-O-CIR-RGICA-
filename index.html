<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVELAÇÃO CIRÚRGICA</title>

<style>

body {
margin:0;
font-family:Arial, sans-serif;
background: radial-gradient(circle at top,#1a1a1a 0%,#050505 55%,#000 100%);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
padding:40px 20px;
}

h1 {
font-size:48px;
margin-bottom:30px;
letter-spacing:2px;
text-align:center;
}

.box {

width:100%;
max-width:900px;
background:#ffffff08;
border:1px solid #ffffff18;
border-radius:20px;
padding:30px;
position:relative;
}

.box p {

font-size:20px;
margin-bottom:25px;
color:#d1d5db;

}

.buttons {

display:flex;
gap:14px;
margin-top:10px;

}

button {

flex:1;
padding:14px;
border-radius:12px;
border:none;
font-weight:bold;
font-size:15px;
cursor:pointer;

}

.btn1 {

background:white;
color:black;

}

.btn2 {

background:#0f172a;
color:white;

}

.topics {

margin-top:40px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;

}

.topic {

border:1px solid #ffffff33;
padding:10px 16px;
border-radius:999px;
font-size:14px;

}

.percent-area {

margin-top:25px;
font-size:14px;
color:#9ca3af;

}

</style>

</head>

<body>

<h1>REVELAÇÃO CIRÚRGICA</h1>

<div class="box">

<p>
Tire suas dúvidas.<br>
Coloque seus arquivos: texto, PDF, áudio e vídeo.
</p>

<div class="buttons">

<button class="btn1">
CONJUGAL
</button>

<button class="btn2">
ENGANAÇÃO
</button>

</div>

<div class="percent-area">

Área preparada para:
% • valores • regras por tópico

</div>

</div>

<div class="topics">

<div class="topic">Empresarial</div>
<div class="topic">Golpes</div>
<div class="topic">Conjugal</div>
<div class="topic">Enganação</div>
<div class="topic">Familiar</div>
<div class="topic">Pessoal</div>
<div class="topic">Profissional</div>

</div>

</body>
</html>
