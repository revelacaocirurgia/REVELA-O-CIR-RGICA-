<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REVELAÇÃO CIRÚRGICA</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f6f7;
  color: #111;
}

.app {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px 14px 40px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.menu-btn,
.account-btn {
  border: none;
  background: white;
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 16px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  cursor: pointer;
}

.logo-card {
  background: white;
  border-radius: 26px;
  padding: 14px;
  margin-bottom: 18px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.08);
  border: 1px solid #e6e6e6;
}

.logo-img {
  width: 100%;
  display: block;
  border-radius: 22px;
}

.panel {
  background: white;
  border-radius: 26px;
  padding: 22px 18px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.10);
  border: 1px solid #e5e5e5;
}

.panel h1 {
  text-align: center;
  margin: 0 0 18px;
  font-size: 30px;
}

.input-area {
  border: 1px solid #dedede;
  border-radius: 24px;
  padding: 16px;
  background: white;
  margin-bottom: 16px;
}

textarea {
  width: 100%;
  min-height: 125px;
  border: none;
  outline: none;
  resize: none;
  font-size: 20px;
  line-height: 1.45;
  font-family: Arial, Helvetica, sans-serif;
  color: #222;
}

textarea::placeholder {
  color: #777;
}

.main-choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 14px;
}

.choice {
  border: none;
  border-radius: 16px;
  padding: 15px 8px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
}

.choice.active {
  background: #111;
  color: white;
}

.choice:not(.active) {
  background: #eeeeee;
  color: #111;
}

.upload {
  display: block;
  border: 1px solid #dedede;
  border-radius: 18px;
  text-align: center;
  padding: 16px;
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 16px;
  cursor: pointer;
}

.upload input {
  display: none;
}

.reveal-btn {
  width: 100%;
  border: none;
  border-radius: 20px;
  padding: 18px;
  background: #111;
  color: white;
  font-size: 22px;
  font-weight: 900;
  cursor: pointer;
}

.topics {
  margin-top: 22px;
  display: flex;
  flex-wrap: wrap;
  gap: 11px;
  justify-content: center;
}

.topic {
  border: 1px solid #d9d9d9;
  background: white;
  border-radius: 999px;
  padding: 11px 17px;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.04);
}

.topic.active {
  background: #111;
  color: white;
  border-color: #111;
}

.result {
  display: none;
  margin-top: 18px;
  background: #f7f7f7;
  border: 1px solid #e1e1e1;
  border-radius: 20px;
  padding: 16px;
}

.progress-wrap {
  width: 100%;
  height: 16px;
  background: #e5e5e5;
  border-radius: 999px;
  overflow: hidden;
  margin: 14px 0;
}

.progress {
  width: 0%;
  height: 100%;
  background: #111;
  border-radius: 999px;
  transition: width 0.18s linear;
}

.percent {
  text-align: center;
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 10px;
}

.result-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 8px;
}

.result-text {
  color: #555;
  line-height: 1.5;
  font-size: 15px;
}

.locked {
  display: none;
  margin-top: 16px;
}

.pay-btn,
.live-btn {
  width: 100%;
  border: none;
  border-radius: 18px;
  padding: 16px;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
  margin-top: 10px;
}

.pay-btn {
  background: #111;
  color: white;
}

.live-btn {
  background: #eeeeee;
  color: #111;
}

.small-note {
  color: #777;
  text-align: center;
  font-size: 14px;
  line-height: 1.45;
  margin-top: 14px;
}

.drawer {
  position: fixed;
  top: 0;
  left: -280px;
  width: 270px;
  height: 100vh;
  background: white;
  z-index: 50;
  box-shadow: 8px 0 24px rgba(0,0,0,0.16);
  padding: 22px;
  transition: left 0.25s ease;
}

.drawer.open {
  left: 0;
}

.drawer h2 {
  margin: 0 0 20px;
  font-size: 22px;
}

.drawer button {
  display: block;
  width: 100%;
  text-align: left;
  border: none;
  background: #f4f4f4;
  padding: 14px;
  border-radius: 14px;
  margin-bottom: 10px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 40;
}

.overlay.show {
  display: block;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 80;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.show {
  display: flex;
}

.modal-card {
  width: 100%;
  max-width: 420px;
  background: white;
  border-radius: 26px;
  padding: 22px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.22);
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}

.tab {
  border: none;
  border-radius: 14px;
  padding: 13px;
  font-weight: 900;
  cursor: pointer;
}

.tab.active {
  background: #111;
  color: white;
}

.tab:not(.active) {
  background: #eeeeee;
  color: #111;
}

.avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: #eeeeee;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: #777;
}

.modal-card input {
  width: 100%;
  border: 1px solid #dedede;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  font-size: 16px;
}

.google-btn {
  width: 100%;
  border: 1px solid #dedede;
  background: white;
  border-radius: 14px;
  padding: 14px;
  font-weight: 900;
  cursor: pointer;
  margin-bottom: 10px;
}

.close-btn {
  width: 100%;
  border: none;
  background: #eeeeee;
  border-radius: 14px;
  padding: 14px;
  font-weight: 900;
  cursor: pointer;
}

@media (max-width: 380px) {
  .panel h1 {
    font-size: 27px;
  }

  textarea {
    font-size: 18px;
  }

  .choice {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<nav id="drawer" class="drawer">
  <h2>Menu</h2>
  <button onclick="closeAll()">Tirar dúvida</button>
  <button onclick="alertInfo('Sobre nós')">Sobre nós</button>
  <button onclick="alertInfo('Contato')">Contato</button>
  <button onclick="alertInfo('Tópicos')">Tópicos</button>
  <button onclick="alertInfo('Escritório')">Escritório</button>
  <button onclick="alertInfo('Fale conosco')">Fale conosco</button>
</nav>

<div id="loginModal" class="modal">
  <div class="modal-card">
    <div class="tabs">
      <button id="loginTab" class="tab active" onclick="setAuthTab('login')">Login</button>
      <button id="cadastroTab" class="tab" onclick="setAuthTab('cadastro')">Cadastro</button>
    </div>

    <div class="avatar">Foto</div>

    <button class="google-btn" onclick="fakeAction()">Continuar com Google</button>

    <input type="email" placeholder="E-mail" />
    <input type="password" placeholder="Senha" />

    <button class="pay-btn" onclick="fakeAction()">OK</button>
    <button class="close-btn" onclick="closeAll()">Fechar</button>
  </div>
</div>

<main class="app">

  <header class="topbar">
    <button class="menu-btn" onclick="openMenu()">☰</button>
    <button class="account-btn" onclick="openLogin()">Login / Cadastro</button>
  </header>

  <section class="logo-card">
    <img src="file_000000006b3c720ead3ef359e6325064.png" class="logo-img" alt="REVELAÇÃO CIRÚRGICA">
  </section>

  <section class="panel">
    <h1>Área de Revelação</h1>

    <div class="input-area">
      <textarea id="texto" placeholder="Tire suas dúvidas. Coloque seus arquivos: texto, PDF, áudio e vídeo."></textarea>

      <div class="main-choices">
        <button class="choice active" onclick="setMainTopic('Conjugal', this)">CONJUGAL</button>
        <button class="choice" onclick="setMainTopic('Enganação', this)">ENGANAÇÃO</button>
      </div>
    </div>

    <label class="upload">
      Enviar imagem, PDF, áudio ou vídeo
      <input id="arquivo" type="file" multiple accept="image/*,.pdf,audio/*,video/*,.txt">
    </label>

    <button class="reveal-btn" onclick="startReveal()">Revelar</button>

    <div id="resultado" class="result">
      <div id="percentual" class="percent">0%</div>

      <div class="progress-wrap">
        <div id="progress" class="progress"></div>
      </div>

      <div id="resultadoTitulo" class="result-title">Análise iniciada</div>
      <div id="resultadoTexto" class="result-text">
        Organizando informações e preparando prévia da revelação.
      </div>

      <div id="lockedArea" class="locked">
        <button class="pay-btn" onclick="unlockReveal()">Liberar Revelação Completa — R$ 98,26</button>
        <button class="live-btn" onclick="scheduleLive()">Agendar atendimento por Live</button>

        <div class="small-note">
          Receba uma análise complementar com atendimento individual.
        </div>
      </div>
    </div>

    <div class="small-note">
      Teste inicial do fluxo: dúvida, arquivo, tópico, prévia em 26%, liberação e atendimento por Live.
    </div>
  </section>

  <section class="topics">
    <button class="topic" onclick="setTopic('Empresarial', this)">Empresarial</button>
    <button class="topic" onclick="setTopic('Golpes', this)">Golpes</button>
    <button class="topic active" onclick="setTopic('Conjugal', this)">Conjugal</button>
    <button class="topic" onclick="setTopic('Enganação', this)">Enganação</button>
    <button class="topic" onclick="setTopic('Familiar', this)">Familiar</button>
    <button class="topic" onclick="setTopic('Pessoal', this)">Pessoal</button>
    <button class="topic" onclick="setTopic('Profissional', this)">Profissional</button>
    <button class="topic" onclick="setTopic('Escolar', this)">Escolar</button>
    <button class="topic" onclick="setTopic('Institucional', this)">Institucional</button>
  </section>

</main>

<script>
let topicoAtual = "Conjugal";
let intervalId = null;

function openMenu() {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}

function openLogin() {
  document.getElementById("loginModal").classList.add("show");
  document.getElementById("overlay").classList.add("show");
}

function closeAll() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("loginModal").classList.remove("show");
}

function setAuthTab(tipo) {
  document.getElementById("loginTab").classList.remove("active");
  document.getElementById("cadastroTab").classList.remove("active");

  if (tipo === "login") {
    document.getElementById("loginTab").classList.add("active");
  } else {
    document.getElementById("cadastroTab").classList.add("active");
  }
}

function setMainTopic(nome, botao) {
  topicoAtual = nome;

  document.querySelectorAll(".choice").forEach(function(item) {
    item.classList.remove("active");
  });

  botao.classList.add("active");
}

function setTopic(nome, botao) {
  topicoAtual = nome;

  document.querySelectorAll(".topic").forEach(function(item) {
    item.classList.remove("active");
  });

  botao.classList.add("active");
}

function startReveal() {
  clearInterval(intervalId);

  const resultado = document.getElementById("resultado");
  const progress = document.getElementById("progress");
  const percentual = document.getElementById("percentual");
  const titulo = document.getElementById("resultadoTitulo");
  const texto = document.getElementById("resultadoTexto");
  const locked = document.getElementById("lockedArea");

  resultado.style.display = "block";
  locked.style.display = "none";
  progress.style.width = "0%";
  percentual.innerText = "0%";
  titulo.innerText = "Análise iniciada";
  texto.innerText = "Cruzando informações, verificando sinais e preparando a prévia.";

  let valor = 0;

  intervalId = setInterval(function() {
    valor++;

    progress.style.width = valor + "%";
    percentual.innerText = valor + "%";

    if (valor === 9) {
      texto.innerText = "Organizando contexto e separando os primeiros indícios.";
    }

    if (valor === 17) {
      texto.innerText = "Comparando padrões e preparando o relatório inicial.";
    }

    if (valor >= 26) {
      clearInterval(intervalId);
      titulo.innerText = "Prévia atingiu 26%";
      texto.innerText = "A análise inicial de " + topicoAtual + " foi preparada. Para visualizar a revelação completa, libere o resultado.";
      locked.style.display = "block";
    }
  }, 210);
}

function unlockReveal() {
  clearInterval(intervalId);

  const progress = document.getElementById("progress");
  const percentual = document.getElementById("percentual");
  const titulo = document.getElementById("resultadoTitulo");
  const texto = document.getElementById("resultadoTexto");
  const locked = document.getElementById("lockedArea");

  let valor = 26;

  intervalId = setInterval(function() {
    valor += 4;

    if (valor > 100) {
      valor = 100;
    }

    progress.style.width = valor + "%";
    percentual.innerText = valor + "%";

    if (valor >= 100) {
      clearInterval(intervalId);
      titulo.innerText = "Revelação liberada";
      texto.innerText = "Resultado completo liberado para teste. Próxima etapa: inserir o texto definitivo da revelação, regras por tópico, percentuais reais e integração de pagamento.";
      locked.style.display = "none";
    }
  }, 120);
}

function scheduleLive() {
  document.getElementById("resultadoTitulo").innerText = "Atendimento por Live";
  document.getElementById("resultadoTexto").innerText = "Solicitação registrada para teste. Próxima etapa: conectar agenda, WhatsApp ou formulário de atendimento.";
}

function alertInfo(nome) {
  closeAll();
  alert(nome + " será configurado na próxima etapa.");
}

function fakeAction() {
  alert("Função visual criada para teste. Integração real será configurada depois.");
}
</script>

</body>
</html>
