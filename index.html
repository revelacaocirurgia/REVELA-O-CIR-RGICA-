<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REVELAÇÃO CIRÚRGICA</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f4f5f6;
  color: #111;
}

.app {
  width: 100%;
  max-width: 520px;
  margin: 0 auto;
  padding: 14px 14px 40px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.login-btn,
.menu-btn {
  border: none;
  background: #ffffff;
  border-radius: 14px;
  padding: 11px 14px;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  cursor: pointer;
}

.main-card {
  background: #ffffff;
  border: 1px solid #e4e4e4;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.10);
}

.logo-img {
  width: 100%;
  display: block;
}

.analysis-panel {
  padding: 18px 16px 20px;
  border-top: 1px solid #eeeeee;
}

.analysis-panel h1 {
  margin: 0 0 14px;
  text-align: center;
  font-size: 29px;
  line-height: 1.1;
}

.analysis-box {
  border: 1px solid #dddddd;
  border-radius: 24px;
  background: #ffffff;
  padding: 13px;
  display: grid;
  grid-template-columns: 46px 1fr 86px;
  gap: 10px;
  align-items: stretch;
  min-height: 155px;
}

.plus-btn {
  border: 1px solid #dddddd;
  background: #f4f4f4;
  border-radius: 16px;
  width: 46px;
  height: 46px;
  font-size: 30px;
  font-weight: 400;
  line-height: 1;
  cursor: pointer;
  align-self: end;
}

.plus-btn input {
  display: none;
}

textarea {
  width: 100%;
  min-height: 124px;
  border: none;
  outline: none;
  resize: none;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 18px;
  line-height: 1.45;
  color: #222;
  padding: 4px 0;
}

textarea::placeholder {
  color: #777;
}

.side-actions {
  display: flex;
  flex-direction: column;
  gap: 9px;
  justify-content: flex-end;
}

.side-actions button {
  border: none;
  border-radius: 14px;
  padding: 11px 6px;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
}

.side-actions .active {
  background: #111111;
  color: #ffffff;
}

.side-actions button:not(.active) {
  background: #eeeeee;
  color: #111111;
}

.start-btn {
  width: 100%;
  border: none;
  border-radius: 20px;
  padding: 17px;
  background: #111111;
  color: #ffffff;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  margin-top: 15px;
}

.topics {
  margin-top: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.topic {
  border: 1px solid #d8d8d8;
  background: #ffffff;
  color: #111111;
  border-radius: 999px;
  padding: 10px 15px;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.04);
}

.topic.active {
  background: #111111;
  color: #ffffff;
  border-color: #111111;
}

.result {
  display: none;
  margin-top: 16px;
  background: #f7f7f7;
  border: 1px solid #e1e1e1;
  border-radius: 20px;
  padding: 15px;
}

.percent {
  text-align: center;
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 10px;
}

.progress-wrap {
  width: 100%;
  height: 15px;
  background: #e2e2e2;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 14px;
}

.progress {
  width: 0%;
  height: 100%;
  background: #111111;
  border-radius: 999px;
  transition: width 0.18s linear;
}

.result-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 8px;
}

.result-text {
  color: #555555;
  line-height: 1.5;
  font-size: 15px;
}

.locked {
  display: none;
  margin-top: 15px;
}

.pay-btn,
.live-btn {
  width: 100%;
  border: none;
  border-radius: 17px;
  padding: 15px;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  margin-top: 10px;
}

.pay-btn {
  background: #111111;
  color: #ffffff;
}

.live-btn {
  background: #eeeeee;
  color: #111111;
}

.note {
  color: #777777;
  text-align: center;
  font-size: 14px;
  line-height: 1.45;
  margin-top: 12px;
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.38);
  z-index: 40;
}

.overlay.show {
  display: block;
}

.drawer {
  position: fixed;
  top: 0;
  right: -285px;
  width: 280px;
  height: 100vh;
  background: #ffffff;
  z-index: 60;
  box-shadow: -8px 0 26px rgba(0,0,0,0.18);
  padding: 22px;
  transition: right 0.25s ease;
}

.drawer.open {
  right: 0;
}

.drawer h2 {
  margin: 0 0 18px;
  font-size: 23px;
}

.drawer button {
  display: block;
  width: 100%;
  border: none;
  background: #f3f3f3;
  padding: 14px;
  border-radius: 14px;
  text-align: left;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 10px;
}

.info-box {
  display: none;
  margin-top: 14px;
  background: #f7f7f7;
  border: 1px solid #e2e2e2;
  border-radius: 16px;
  padding: 14px;
  color: #444444;
  font-size: 14px;
  line-height: 1.45;
}

.info-box.show {
  display: block;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 80;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.show {
  display: flex;
}

.modal-card {
  width: 100%;
  max-width: 420px;
  background: #ffffff;
  border-radius: 26px;
  padding: 22px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.24);
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.tab {
  border: none;
  border-radius: 14px;
  padding: 13px;
  font-weight: 900;
  cursor: pointer;
  background: #eeeeee;
  color: #111111;
}

.tab.active {
  background: #111111;
  color: #ffffff;
}

.avatar {
  width: 74px;
  height: 74px;
  border-radius: 50%;
  background: #eeeeee;
  color: #777777;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  margin: 0 auto 14px;
}

.google-btn {
  width: 100%;
  border: 1px solid #dddddd;
  background: #ffffff;
  border-radius: 14px;
  padding: 14px;
  font-weight: 900;
  cursor: pointer;
  margin-bottom: 10px;
}

.modal-card input {
  width: 100%;
  border: 1px solid #dddddd;
  border-radius: 14px;
  padding: 14px;
  font-size: 16px;
  margin-bottom: 10px;
}

.ok-btn {
  width: 100%;
  border: none;
  background: #111111;
  color: #ffffff;
  border-radius: 14px;
  padding: 14px;
  font-weight: 900;
  cursor: pointer;
  margin-bottom: 10px;
}

.close-btn {
  width: 100%;
  border: none;
  background: #eeeeee;
  color: #111111;
  border-radius: 14px;
  padding: 14px;
  font-weight: 900;
  cursor: pointer;
}

@media (max-width: 410px) {
  .analysis-box {
    grid-template-columns: 42px 1fr 78px;
    gap: 8px;
  }

  .plus-btn {
    width: 42px;
    height: 42px;
    font-size: 27px;
  }

  textarea {
    font-size: 16px;
  }

  .side-actions button {
    font-size: 11px;
    padding: 10px 4px;
  }

  .analysis-panel h1 {
    font-size: 27px;
  }
}
</style>
</head>

<body>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<nav id="drawer" class="drawer">
  <h2>Menu</h2>

  <button onclick="showInfo('sobre')">Sobre nós</button>
  <button onclick="showInfo('contato')">Contato</button>
  <button onclick="showInfo('topicos')">Tópicos</button>
  <button onclick="showInfo('escritorio')">Escritório</button>
  <button onclick="showInfo('duvidas')">Tirar dúvidas</button>

  <div id="infoBox" class="info-box"></div>
</nav>

<div id="loginModal" class="modal">
  <div class="modal-card">
    <div class="tabs">
      <button id="loginTab" class="tab active" onclick="setAuthTab('login')">Login</button>
      <button id="cadastroTab" class="tab" onclick="setAuthTab('cadastro')">Cadastro</button>
    </div>

    <div class="avatar">Foto</div>

    <button class="google-btn" onclick="loginFake()">Continuar com Google</button>

    <input type="email" placeholder="E-mail" />
    <input type="password" placeholder="Senha" />

    <button class="ok-btn" onclick="loginFake()">OK</button>
    <button class="close-btn" onclick="closeAll()">Fechar</button>
  </div>
</div>

<main class="app">

  <header class="topbar">
    <button id="loginButton" class="login-btn" onclick="openLogin()">Login / Cadastro</button>
    <button class="menu-btn" onclick="openMenu()">☰</button>
  </header>

  <section class="main-card">
    <img src="file_000000006b3c720ead3ef359e6325064.png" class="logo-img" alt="REVELAÇÃO CIRÚRGICA">

    <div class="analysis-panel">
      <h1>Área de Análise</h1>

      <div class="analysis-box">
        <label class="plus-btn" onclick="needLogin(event)">
          +
          <input id="arquivo" type="file" multiple accept="image/*,.pdf,audio/*,video/*,.txt" />
        </label>

        <textarea id="texto" placeholder="Descreva sua situação ou envie texto, imagem, PDF, áudio, vídeo ou outros arquivos para análise."></textarea>

        <div class="side-actions">
          <button id="btnConjugal" class="active" onclick="setMainTopic('Conjugal')">CONJUGAL</button>
          <button id="btnEnganacao" onclick="setMainTopic('Enganação')">ENGANAÇÃO</button>
        </div>
      </div>

      <button class="start-btn" onclick="startAnalysis()">Iniciar análise</button>

      <div id="resultado" class="result">
        <div id="percentual" class="percent">0%</div>

        <div class="progress-wrap">
          <div id="progress" class="progress"></div>
        </div>

        <div id="resultadoTitulo" class="result-title">Análise iniciada</div>
        <div id="resultadoTexto" class="result-text">
          Organizando informações e preparando prévia.
        </div>

        <div id="lockedArea" class="locked">
          <button class="pay-btn" onclick="unlockAnalysis()">Liberar análise completa — R$ 98,26</button>
          <button class="live-btn" onclick="scheduleLive()">Agendar atendimento por Live</button>

          <div class="note">
            Receba uma análise complementar com atendimento individual.
          </div>
        </div>
      </div>

      <div class="note">
        Para iniciar qualquer análise, entre ou cadastre-se.
      </div>
    </div>
  </section>

  <section class="topics">
    <button class="topic" onclick="setTopic('Empresarial', this)">Empresarial</button>
    <button class="topic" onclick="setTopic('Golpes', this)">Golpes</button>
    <button class="topic active" onclick="setTopic('Conjugal', this)">Conjugal</button>
    <button class="topic" onclick="setTopic('Enganação', this)">Enganação</button>
    <button class="topic" onclick="setTopic('Familiar', this)">Familiar</button>
    <button class="topic" onclick="setTopic('Pessoal', this)">Pessoal</button>
    <button class="topic" onclick="setTopic('Profissional', this)">Profissional</button>
    <button class="topic" onclick="setTopic('Escolar', this)">Escolar</button>
    <button class="topic" onclick="setTopic('Institucional', this)">Institucional</button>
  </section>

</main>

<script>
let loggedIn = false;
let topicoAtual = "Conjugal";
let intervalId = null;

function openMenu() {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}

function openLogin() {
  document.getElementById("loginModal").classList.add("show");
  document.getElementById("overlay").classList.add("show");
}

function closeAll() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("loginModal").classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
}

function setAuthTab(tipo) {
  document.getElementById("loginTab").classList.remove("active");
  document.getElementById("cadastroTab").classList.remove("active");

  if (tipo === "login") {
    document.getElementById("loginTab").classList.add("active");
  } else {
    document.getElementById("cadastroTab").classList.add("active");
  }
}

function loginFake() {
  loggedIn = true;
  document.getElementById("loginButton").innerText = "Logado";
  closeAll();
}

function requireLogin() {
  if (!loggedIn) {
    openLogin();
    return false;
  }

  return true;
}

function needLogin(event) {
  if (!loggedIn) {
    event.preventDefault();
    openLogin();
  }
}

function setMainTopic(nome) {
  if (!requireLogin()) return;

  topicoAtual = nome;

  document.getElementById("btnConjugal").classList.remove("active");
  document.getElementById("btnEnganacao").classList.remove("active");

  if (nome === "Conjugal") {
    document.getElementById("btnConjugal").classList.add("active");
  } else {
    document.getElementById("btnEnganacao").classList.add("active");
  }
}

function setTopic(nome, botao) {
  if (!requireLogin()) return;

  topicoAtual = nome;

  document.querySelectorAll(".topic").forEach(function(item) {
    item.classList.remove("active");
  });

  botao.classList.add("active");
}

function startAnalysis() {
  if (!requireLogin()) return;

  clearInterval(intervalId);

  const resultado = document.getElementById("resultado");
  const progress = document.getElementById("progress");
  const percentual = document.getElementById("percentual");
  const titulo = document.getElementById("resultadoTitulo");
  const texto = document.getElementById("resultadoTexto");
  const locked = document.getElementById("lockedArea");

  resultado.style.display = "block";
  locked.style.display = "none";
  progress.style.width = "0%";
  percentual.innerText = "0%";
  titulo.innerText = "Análise iniciada";
  texto.innerText = "Cruzando informações, verificando sinais e preparando a prévia.";

  let valor = 0;

  intervalId = setInterval(function() {
    valor++;

    progress.style.width = valor + "%";
    percentual.innerText = valor + "%";

    if (valor === 9) {
      texto.innerText = "Organizando contexto e separando os primeiros indícios.";
    }

    if (valor === 17) {
      texto.innerText = "Comparando padrões e preparando o relatório inicial.";
    }

    if (valor >= 26) {
      clearInterval(intervalId);
      titulo.innerText = "Prévia atingiu 26%";
      texto.innerText = "A análise inicial de " + topicoAtual + " foi preparada. Para visualizar a análise completa, libere o resultado.";
      locked.style.display = "block";
    }
  }, 220);
}

function unlockAnalysis() {
  if (!requireLogin()) return;

  clearInterval(intervalId);

  const progress = document.getElementById("progress");
  const percentual = document.getElementById("percentual");
  const titulo = document.getElementById("resultadoTitulo");
  const texto = document.getElementById("resultadoTexto");
  const locked = document.getElementById("lockedArea");

  let valor = 26;

  intervalId = setInterval(function() {
    valor += 4;

    if (valor > 100) {
      valor = 100;
    }

    progress.style.width = valor + "%";
    percentual.innerText = valor + "%";

    if (valor >= 100) {
      clearInterval(intervalId);
      titulo.innerText = "Análise liberada";
      texto.innerText = "Resultado completo liberado para teste. Próxima etapa: inserir regras finais por tópico, percentuais reais, pagamento e relatório definitivo.";
      locked.style.display = "none";
    }
  }, 120);
}

function scheduleLive() {
  if (!requireLogin()) return;

  document.getElementById("resultado").style.display = "block";
  document.getElementById("resultadoTitulo").innerText = "Atendimento por Live";
  document.getElementById("resultadoTexto").innerText = "Solicitação registrada para teste. Próxima etapa: conectar agenda, WhatsApp ou formulário.";
}

function showInfo(tipo) {
  const box = document.getElementById("infoBox");

  const textos = {
    sobre: "Texto provisório: plataforma de análise estratégica para organizar informações, arquivos e sinais em situações conjugais, empresariais, pessoais e de risco.",
    contato: "Contato: espaço reservado para telefone, WhatsApp, e-mail ou formulário.",
    topicos: "Tópicos: Conjugal, Enganação, Golpes, Empresarial, Familiar, Pessoal, Profissional, Escolar e Institucional.",
    escritorio: "Escritório: espaço reservado para apresentação profissional, estrutura de atendimento e dados comerciais.",
    duvidas: "Tirar dúvidas: descreva sua situação na Área de Análise e envie arquivos quando necessário."
  };

  box.innerText = textos[tipo];
  box.classList.add("show");
}
</script>

</body>
</html>
